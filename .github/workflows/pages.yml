name: Deploy demo page to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Default checkout does not smudge LFS files; the demo site's audio
      # is stored as plain git blobs (see .gitattributes) so nothing from
      # LFS is needed to build the page.
      - uses: actions/checkout@v4

      # Mirror the site into the gh-pages branch with a neutral author so
      # anonymized mirrors (e.g. anonymous.4open.science) can serve it
      - name: Sync gh-pages branch
        run: |
          TREE=$(git rev-parse HEAD:results/paper_results/single_kit_examples)
          NOJ=$(git hash-object -w /dev/null)
          NEWTREE=$({ git ls-tree "$TREE"; printf '100644 blob %s\t.nojekyll\n' "$NOJ"; } | git mktree)
          COMMIT=$(GIT_AUTHOR_NAME=anonymous GIT_AUTHOR_EMAIL=anonymous@users.noreply.github.com \
                   GIT_COMMITTER_NAME=anonymous GIT_COMMITTER_EMAIL=anonymous@users.noreply.github.com \
                   git commit-tree "$NEWTREE" -m "Deploy demo site")
          git push --force origin "$COMMIT:refs/heads/gh-pages"

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: results/paper_results/single_kit_examples

      - id: deployment
        uses: actions/deploy-pages@v4
